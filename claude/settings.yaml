---
# This file is a fragment for Claude Code's settings.json.
#
# It is NOT read by Claude Code directly. The sibling Makefile converts it
# into JSON with `yq` and deep-merges it into ~/.claude/settings.json
# (see the `settings` target). Each top-level key below is a settings.json
# setting; on `make clean` these same top-level keys are removed again.
#
# Settings reference:
# - en: https://code.claude.com/docs/en/settings
# - ja: https://code.claude.com/docs/ja/settings
language: Japanese
tui: fullscreen
theme: dark
agentPushNotifEnabled: true
remoteControlAtStartup: true
permissions:
  allow:
  # Git
  - "Bash(git blame:*)"
  - "Bash(git branch --list:*)"
  - "Bash(git branch -l:*)"
  - "Bash(git cat-file:*)"
  - "Bash(git config --get:*)"
  - "Bash(git config --list:*)"
  - "Bash(git config -l:*)"
  - "Bash(git describe:*)"
  - "Bash(git diff:*)"
  - "Bash(git fetch:*)"
  - "Bash(git grep:*)"
  - "Bash(git log:*)"
  - "Bash(git ls-files:*)"
  - "Bash(git ls-remote:*)"
  - "Bash(git reflog:*)"
  - "Bash(git remote -v)"
  - "Bash(git remote get-url:*)"
  - "Bash(git remote show:*)"
  - "Bash(git rev-parse:*)"
  - "Bash(git shortlog:*)"
  - "Bash(git show:*)"
  - "Bash(git stash list:*)"
  - "Bash(git status:*)"
  - "Bash(git tag --list:*)"
  - "Bash(git tag -l:*)"
  - "Bash(git worktree list:*)"
  # GitHub CLI
  - "Bash(gh issue list:*)"
  - "Bash(gh issue status:*)"
  - "Bash(gh issue view:*)"
  - "Bash(gh label list:*)"
  - "Bash(gh pr checks:*)"
  - "Bash(gh pr diff:*)"
  - "Bash(gh pr list:*)"
  - "Bash(gh pr status:*)"
  - "Bash(gh pr view:*)"
  - "Bash(gh release list:*)"
  - "Bash(gh release view:*)"
  - "Bash(gh repo view:*)"
  - "Bash(gh run list:*)"
  - "Bash(gh run view:*)"
  - "Bash(gh search:*)"
  - "Bash(gh status:*)"
  - "Bash(gh workflow list:*)"
  - "Bash(gh workflow view:*)"
  # Go
  - "Bash(go build:*)"
  - "Bash(go doc:*)"
  - "Bash(go fmt:*)"
  - "Bash(go list:*)"
  - "Bash(go run:*)"
  - "Bash(go test:*)"
  - "Bash(go version:*)"
  - "Bash(go vet:*)"
  - "Bash(gofmt:*)"
  # Rust
  - "Bash(cargo b:*)"
  - "Bash(cargo bench:*)"
  - "Bash(cargo build:*)"
  - "Bash(cargo c:*)"
  - "Bash(cargo check:*)"
  - "Bash(cargo clean:*)"
  - "Bash(cargo clippy:*)"
  - "Bash(cargo d:*)"
  - "Bash(cargo doc:*)"
  - "Bash(cargo fmt:*)"
  - "Bash(cargo metadata:*)"
  - "Bash(cargo r:*)"
  - "Bash(cargo run:*)"
  - "Bash(cargo t:*)"
  - "Bash(cargo test:*)"
  - "Bash(cargo tree:*)"
  - "Bash(cargo --version:*)"
  # NPM
  - "Bash(npm audit:*)"
  - "Bash(npm ci:*)"
  - "Bash(npm install:*)"
  - "Bash(npm ls:*)"
  - "Bash(npm outdated:*)"
  - "Bash(npm run:*)"
  - "Bash(npm test:*)"
  - "Bash(npm version:*)"
  - "Bash(npm view:*)"
  # PNPM
  - "Bash(pnpm audit:*)"
  - "Bash(pnpm install:*)"
  - "Bash(pnpm list:*)"
  - "Bash(pnpm ls:*)"
  - "Bash(pnpm outdated:*)"
  - "Bash(pnpm run:*)"
  - "Bash(pnpm test:*)"
  - "Bash(pnpm view:*)"
  - "Bash(pnpm why:*)"
  # Make
  - "Bash(make --dry-run:*)"
  - "Bash(make --question:*)"
  - "Bash(make -n:*)"
  - "Bash(make -q:*)"
  # Task
  - "Bash(task --list:*)"
  - "Bash(task --list-all:*)"
  - "Bash(task --summary:*)"
  - "Bash(task -a:*)"
  - "Bash(task -l:*)"
  # Coreutils (read-only)
  - "Bash(basename:*)"
  - "Bash(cat:*)"
  - "Bash(cut:*)"
  - "Bash(date:*)"
  - "Bash(df:*)"
  - "Bash(dirname:*)"
  - "Bash(du:*)"
  - "Bash(echo:*)"
  - "Bash(env:*)"
  - "Bash(head:*)"
  - "Bash(id:*)"
  - "Bash(ls:*)"
  - "Bash(md5sum:*)"
  - "Bash(printenv:*)"
  - "Bash(pwd:*)"
  - "Bash(realpath:*)"
  - "Bash(sha256sum:*)"
  - "Bash(sort:*)"
  - "Bash(stat:*)"
  - "Bash(tail:*)"
  - "Bash(uname:*)"
  - "Bash(uniq:*)"
  - "Bash(wc:*)"
  - "Bash(whoami:*)"
  # Shell (read-only)
  - "Bash(cmp:*)"
  - "Bash(column:*)"
  - "Bash(diff:*)"
  - "Bash(fd:*)"
  - "Bash(file:*)"
  - "Bash(hostname:*)"
  - "Bash(jq:*)"
  - "Bash(rg:*)"
  - "Bash(tree:*)"
  - "Bash(type:*)"
  - "Bash(which:*)"
  - "Bash(yq:*)"
